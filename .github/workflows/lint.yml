name: Lint Shell Scripts

on:
  push:
    branches: ["**"]
    paths:
      - "**/*.sh"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**/*.sh"
      - ".github/workflows/lint.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell scripts
        run: |
          echo "🔍 Finding all .sh files..."
          SCRIPTS=$(find . -name "*.sh" -not -path "./.git/*")

          if [ -z "$SCRIPTS" ]; then
            echo "✅ No shell scripts found — nothing to lint."
            exit 0
          fi

          echo "$SCRIPTS" | xargs shellcheck \
            --severity=warning \
            --format=gcc

      - name: ShellCheck Summary
        if: always()
        run: |
          COUNT=$(find . -name "*.sh" -not -path "./.git/*" | wc -l)
          echo "📊 Total scripts checked: $COUNT"
